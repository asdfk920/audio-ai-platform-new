      days:
        description: 续费天数
        type: integer
      renewalTime:
        description: 续费时间戳
        type: integer
    type: object
  dto.ResetSysUserPwdReq:
    properties:
      createBy:
        type: integer
      deleteBy:
        type: integer
      password:
        type: string
      updateBy:
        type: integer
      userId:
        description: 用户ID
        type: integer
    type: object
  dto.SysAdminCreateReq:
    properties:
      avatar:
        description: 头像（选填）
        maxLength: 255
        type: string
      createBy:
        type: integer
      deleteBy:
        type: integer
      email:
        description: 邮箱（选填）
        maxLength: 100
        type: string
      nickname:
        description: 昵称（必填）
        maxLength: 50
        type: string
      password:
        description: 密码（必填）
        maxLength: 20
        minLength: 8
        type: string
      phone:
        description: 手机号（选填）
        type: string
      remark:
        description: 备注（选填）
        maxLength: 255
        type: string
      role_ids:
        description: 角色 ID 列表（必填）
        items:
          type: integer
        minItems: 1
        type: array
      status:
        description: 状态（选填，1:禁用 2:正常）
        enum:
        - "1"
        - "2"
        type: string
      updateBy:
        type: integer
      username:
        description: 用户名（必填）
        maxLength: 20
        minLength: 6
        type: string
    required:
    - nickname
    - password
    - role_ids
    - username
    type: object
  dto.SysAdminDeleteReq:
    properties:
      confirm:
        description: 确认标识（选填）
        type: boolean
      createBy:
        type: integer
      deleteBy:
        type: integer
      reason:
        description: 删除原因（选填）
        type: string
      updateBy:
        type: integer
      user_id:
        description: 用户 ID（必填）
        type: integer
    required:
    - user_id
    type: object
  dto.SysAdminStatusReq:
    properties:
      createBy:
        type: integer
      deleteBy:
        type: integer
      status:
        description: 状态（1:禁用 2:正常）
        enum:
        - "1"
        - "2"
        type: string
      updateBy:
        type: integer
      user_id:
        description: 用户 ID（必填）
        type: integer
    required:
    - status
    - user_id
    type: object
  dto.SysAdminUpdateReq:
    properties:
      avatar:
        description: 头像
        maxLength: 255
        type: string
      createBy:
        type: integer
      deleteBy:
        type: integer
      email:
        description: 邮箱
        maxLength: 100
        type: string
      nickname:
        description: 昵称
        maxLength: 50
        type: string
      phone:
        description: 手机号
        type: string
      remark:
        description: 备注
        maxLength: 255
        type: string
      role_ids:
        description: 角色 ID 列表
        items:
          type: integer
        minItems: 1
        type: array
      status:
        description: 状态
        enum:
        - "1"
        - "2"
        type: string
      updateBy:
        type: integer
      user_id:
        description: 用户 ID（必填）
        type: integer
    required:
    - nickname
    - role_ids
    - user_id
    type: object
  dto.SysApiDeleteReq:
    properties:
      ids:
        items:
          type: integer
        type: array
    type: object
  dto.SysApiUpdateReq:
    properties:
      action:
        type: string
      createBy:
        type: integer
      deleteBy:
        type: integer
      handle:

definitions:
  apis.FirmwareDeleteReq:
    properties:
      confirm:
        type: boolean
      firmware_id:
        type: integer
      force:
        type: boolean
      product_key:
        type: string
      reason:
        type: string
      version:
        type: string
    type: object
  apis.instructionCancelReq:
    properties:
      reason:
        type: string
    type: object
  apis.platformDeviceDeleteReq:
    properties:
      confirm:
        type: boolean
      device_id:
        type: integer
      sn:
        type: string
    required:
    - confirm
    type: object
  apis.shadowDesiredReq:
    properties:
      desired:
        items:
          type: integer
        type: array
      merge:
        description: 与库中已有 desired 合并；默认 false 为全量覆盖
        type: boolean
      sn:
        type: string
    type: object
  dto.BenefitInfo:
    properties:
      benefitCode:
        description: 权益编码
        type: string
      benefitName:
        description: 权益名称
        type: string
      expireTime:
        description: 过期时间戳
        type: integer
      remainingCount:
        description: 剩余次数
        type: integer
      status:
        description: 状态 0-可用 1-已用完 2-已过期
        type: integer
      totalCount:
        description: 总次数
        type: integer
      usedCount:
        description: 已用次数
        type: integer
    type: object
  dto.GetSetSysConfigReq:
    properties:
      configKey:
        type: string
      configValue:
        type: string
    type: object
  dto.MemberLevelConfig:
    properties:
      color:
        description: 颜色标签
        type: string
      description:
        description: 描述
        type: string
      deviceBindLimit:
        description: 绑定设备上限
        type: integer
      level:
        description: 等级
        type: integer
      name:
        description: 等级名称
        type: string
    type: object
  dto.MemberRightConfig:
    properties:
      rightKey:
        description: 权益键
        type: string
      rightName:
        description: 权益名称
        type: string
      rightType:
        description: 权益类型：int/bool/string
        type: string
      rightValue:
        description: 权益值
    type: object
  dto.OperateRecord:
    properties:
      newExpireTime:
        description: 新过期时间
        type: integer
      newLevel:
        description: 新等级
        type: integer
      oldExpireTime:
        description: 原过期时间
        type: integer
      oldLevel:
        description: 原等级
        type: integer
      operateAdmin:
        description: 操作管理员 ID
        type: integer
      operateAdminName:
        description: 操作管理员姓名
        type: string
      operateTime:
        description: 操作时间戳
        type: integer
      operateType:
        description: 操作类型 1-修改等级 2-冻结 3-解冻 4-修改过期时间
        type: integer
      remark:
        description: 备注
        type: string
    type: object
  dto.OrderRecord:
    properties:
      memberDays:
        description: 会员天数
        type: integer
      memberLevel:
        description: 会员等级
        type: integer
      orderId:
        description: 订单 ID
        type: string
      orderStatus:
        description: 订单状态 0-待支付 1-已支付 2-已取消 3-已退款
        type: integer
      orderTime:
        description: 订单时间戳
        type: integer
      orderType:
        description: 订单类型 1-新购 2-续费 3-升级
        type: integer
      payAmount:
        description: 支付金额（分）
        type: integer
      payType:
        description: 支付方式 1-微信 2-支付宝 3-银行卡
        type: integer
    type: object
  dto.PassWord:
    properties:
      newPassword:
        type: string
      oldPassword:
        type: string
    type: object
  dto.PlatformMemberDetailResp:
    properties:
      availableBenefits:
        description: 可用权益列表
        items:
          $ref: '#/definitions/dto.BenefitInfo'
        type: array
      avatar:
        description: 头像
        type: string
      bindDeviceCount:
        description: 其他统计
        type: integer
      currentBindCount:
        description: 当前绑定数量
        type: integer
      deviceBindLimit:
        description: 会员权益信息
        type: integer
      expireTime:
        description: 会员过期时间戳
        type: integer
      isAutoRenew:
        description: 是否自动续费
        type: boolean
      isExpiringSoon:
        description: 是否即将到期（7 天内）
        type: boolean
      lastRenewalTime:
        description: 最后续费时间
        type: integer
      levelConfig:
        allOf:
        - $ref: '#/definitions/dto.MemberLevelConfig'
        description: 会员等级配置
      memberLevel:
        description: 会员核心信息
        type: integer
      memberLevelName:
        description: 会员等级名称
        type: string
      memberStatus:
        description: 会员状态 0-正常 1-过期 2-冻结 3-未开通
        type: integer
      mobile:
        description: 手机号（脱敏）
        type: string
      nickname:
        description: 用户昵称
        type: string
      operateRecords:
        description: 管理员操作记录
        items:
          $ref: '#/definitions/dto.OperateRecord'
        type: array
      orderRecords:
        description: 购买/订单记录
        items:
          $ref: '#/definitions/dto.OrderRecord'
        type: array
      remainingDays:
        description: 剩余天数
        type: integer
      renewalRecords:
        description: 续费记录
        items:
          $ref: '#/definitions/dto.RenewalRecord'
        type: array
      startTime:
        description: 开通会员时间戳
        type: integer
      usedBenefits:
        description: 已用权益列表
        items:
          $ref: '#/definitions/dto.BenefitInfo'
        type: array
      userId:
        description: 用户基础信息
        type: integer
      userStatus:
        description: 用户账号状态 0-禁用 1-正常
        type: integer
    type: object
  dto.PlatformMemberFreezeReq:
    properties:
      createBy:
        type: integer
      deleteBy:
        type: integer
      freezeReason:
        description: 冻结原因（必填）
        type: string
      operatorId:
        description: 操作管理员 ID
        type: integer
      updateBy:
        type: integer
      userId:
        type: integer
    required:
    - freezeReason
    - userId
    type: object
  dto.PlatformMemberFreezeResp:
    properties:
      expireTime:
        description: 会员过期时间戳
        type: integer
      freezeReason:
        description: 冻结原因
        type: string
      freezeTime:
        description: 冻结时间戳
        type: integer
      memberLevel:
        description: 会员等级
        type: integer
      memberLevelName:
        description: 会员等级名称
        type: string
      memberStatus:
        description: 会员状态（2-冻结）
        type: integer
      operatorId:
        description: 操作管理员 ID
        type: integer
      updateTime:
        description: 更新时间戳
        type: integer
      userId:
        description: 用户 ID
        type: integer
    type: object
  dto.PlatformMemberListItem:
    properties:
      avatar:
        description: 头像
        type: string
      bindDeviceCount:
        description: 绑定设备数量
        type: integer
      createTime:
        description: 开通会员时间戳
        type: integer
      expireTime:
        description: 会员过期时间戳
        type: integer
      memberLevel:
        description: 会员等级
        type: integer
      memberLevelName:
        description: 会员等级名称
        type: string
      memberStatus:
        description: 会员状态 0-正常 1-过期 2-冻结
        type: integer
      mobile:
        description: 手机号（脱敏）
        type: string
      nickname:
        description: 用户昵称
        type: string
      remainingDays:
        description: 剩余天数
        type: integer
      startTime:
        description: 开通会员时间戳
        type: integer
      updateTime:
        description: 最后更新时间戳
        type: integer
      userId:
        description: 用户 ID
        type: integer
    type: object
  dto.PlatformMemberListResp:
    properties:
      list:
        description: 会员列表
        items:
          $ref: '#/definitions/dto.PlatformMemberListItem'
        type: array
      page:
        description: 当前页码
        type: integer
      pageSize:
        description: 每页条数
        type: integer
      total:
        description: 总条数
        type: integer
    type: object
  dto.PlatformMemberRightConfigReq:
    properties:
      createBy:
        type: integer
      deleteBy:
        type: integer
      levelId:
        description: 会员等级 ID
        type: integer
      levelName:
        description: 会员等级名称
        type: string
      operatorId:
        description: 操作管理员 ID
        type: integer
      remark:
        description: 备注
        type: string
      rights:
        description: 权益配置列表
        items:
          $ref: '#/definitions/dto.MemberRightConfig'
        type: array
      status:
        description: 状态 0-禁用 1-启用
        enum:
        - 0
        - 1
        type: integer
      updateBy:
        type: integer
    required:
    - levelId
    type: object
  dto.PlatformMemberRightConfigResp:
    properties:
      levelId:
        description: 会员等级 ID
        type: integer
      levelName:
        description: 会员等级名称
        type: string
      operatorId:
        description: 操作管理员 ID
        type: integer
      operatorName:
        description: 操作人名称
        type: string
      rights:
        description: 权益配置列表
        items:
          $ref: '#/definitions/dto.MemberRightConfig'
        type: array
      status:
        description: 状态
        type: integer
      updateTime:
        description: 更新时间戳
        type: integer
    type: object
  dto.PlatformMemberUnfreezeReq:
    properties:
      createBy:
        type: integer
      deleteBy:
        type: integer
      operatorId:
        description: 操作管理员 ID
        type: integer
      unfreezeReason:
        description: 解冻原因（必填）
        type: string
      updateBy:
        type: integer
      userId:
        type: integer
    required:
    - unfreezeReason
    - userId
    type: object
  dto.PlatformMemberUnfreezeResp:
    properties:
      expireTime:
        description: 会员过期时间戳
        type: integer
      memberLevel:
        description: 会员等级
        type: integer
      memberLevelName:
        description: 会员等级名称
        type: string
      memberStatus:
        description: 会员状态（0-正常）
        type: integer
      operatorId:
        description: 操作管理员 ID
        type: integer
      unfreezeReason:
        description: 解冻原因
        type: string
      unfreezeTime:
        description: 解冻时间戳
        type: integer
      updateTime:
        description: 更新时间戳
        type: integer
      userId:
        description: 用户 ID
        type: integer
    type: object
  dto.PlatformMemberUpdateReq:
    properties:
      createBy:
        type: integer
      days:
        description: 有效期天数（与 expireTime 二选一）
        type: integer
      deleteBy:
        type: integer
      expireTime:
        type: integer
      memberLevel:
        enum:
        - 0
        - 1
        - 2
        - 3
        type: integer
      operationType:
        description: 操作类型 1-开通 2-续费 3-升级 4-降级 5-延长
        type: integer
      operatorId:
        description: 操作管理员 ID（从 JWT 获取）
        type: integer
      remark:
        description: 操作备注（必填）
        type: string
      updateBy:
        type: integer
      userId:
        type: integer
    required:
    - expireTime
    - memberLevel
    - userId
    type: object
  dto.PlatformMemberUpdateResp:
    properties:
      expireTime:
        description: 会员过期时间戳
        type: integer
      memberLevel:
        description: 会员等级
        type: integer
      memberLevelName:
        description: 会员等级名称
        type: string
      memberStatus:
        description: 会员状态
        type: integer
      oldExpireTime:
        description: 原过期时间
        type: integer
      oldLevel:
        description: 原等级
        type: integer
      operationType:
        description: 操作类型
        type: integer
      remainingDays:
        description: 剩余天数
        type: integer
      remark:
        description: 操作备注
        type: string
      updateTime:
        description: 更新时间戳
        type: integer
      userId:
        description: 用户 ID
        type: integer
    type: object
  dto.PlatformUserCreateReq:
    properties:
      avatar:
        maxLength: 500
        type: string
      createBy:
        type: integer
      deleteBy:
        type: integer
      email:
        type: string
      mobile:
        type: string
      nickname:
        maxLength: 100
        type: string
      password:
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
      updateBy:
        type: integer
    required:
    - email
    - mobile
    - nickname
    - password
    - status
    type: object
  dto.PlatformUserInfoResp:
    properties:
      active_session_count:
        description: 会话信息
        type: integer
      avatar:
        description: 头像
        type: string
      bind_device_count:
        description: 设备信息
        type: integer
      birthday:
        description: yyyy-MM-dd，由服务层从 DB 填充
        type: string
      created_at:
        description: 创建时间
        type: string
      device_list:
        description: 设备列表
        items:
          $ref: '#/definitions/dto.UserDeviceItem'
        type: array
      email:
        description: 邮箱
        type: string
      gender:
        type: integer
      last_login_ip:
        description: 最后登录 IP
        type: string
      last_login_time:
        description: 最后登录时间戳
        type: integer
      member_created_at:
        description: 会员开通时间戳
        type: integer
      member_expire_at:
        description: 会员过期时间戳
        type: integer
      member_level:
        description: 会员信息
        type: integer
      member_level_name:
        description: 会员等级名称
        type: string
      member_status:
        description: 会员状态 0-正常 1-过期 2-冻结
        type: integer
      mobile:
        description: 手机号（脱敏）
        type: string
      nickname:
        description: 昵称
        type: string
      online_device_count:
        description: 在线设备数
        type: integer
      real_name:
        type: string
      real_name_info:
        allOf:
        - $ref: '#/definitions/dto.RealNameInfo'
        description: 实名信息
      real_name_status:
        description: 实名状态
        type: integer
      recent_logins:
        description: 最近登录记录
        items:
          $ref: '#/definitions/dto.RecentLogin'
        type: array
      register_time:
        description: 注册时间戳
        type: integer
      roles:
        items:
          $ref: '#/definitions/dto.PlatformUserRoleItem'
        type: array
      status:
        description: 账号状态 0 禁用 1 正常
        type: integer
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 基础信息
        type: integer
      username:
        type: string
    type: object
  dto.PlatformUserListItem:
    properties:
      avatar:
        description: 头像
        type: string
      bind_device_count:
        description: 绑定设备数量
        type: integer
      created_at:
        description: 创建时间
        type: string
      email:
        description: 邮箱
        type: string
      gender:
        description: 性别
        type: integer
      last_login_time:
        description: 最后登录时间戳
        type: integer
      member_expire_at:
        description: 会员过期时间戳
        type: integer
      member_level:
        description: 会员等级
        type: integer
      member_level_name:
        description: 会员等级名称
        type: string
      mobile:
        description: 手机号
        type: string
      nickname:
        description: 昵称
        type: string
      real_name:
        description: 姓名
        type: string
      real_name_status:
        description: 实名状态
        type: integer
      register_time:
        description: 注册时间戳
        type: integer
      role_names:
        description: 所属角色（逗号分隔）
        type: string
      status:
        description: 账号状态 0 禁用 1 正常
        type: integer
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 用户 ID
        type: integer
      username:
        description: 用户名
        type: string
    type: object
  dto.PlatformUserListResp:
    properties:
      list:
        description: 用户列表
        items:
          $ref: '#/definitions/dto.PlatformUserListItem'
        type: array
      page:
        description: 当前页码
        type: integer
      pageSize:
        description: 每页条数
        type: integer
      total:
        description: 总条数
        type: integer
    type: object
  dto.PlatformUserRoleItem:
    properties:
      id:
        type: integer
      name:
        type: string
      roleKey:
        type: string
    type: object
  dto.PlatformUserUpdateReq:
    properties:
      avatar:
        maxLength: 500
        type: string
      birthday:
        type: string
      createBy:
        type: integer
      deleteBy:
        type: integer
      email:
        type: string
      gender:
        enum:
        - 0
        - 1
        - 2
        type: integer
      mobile:
        type: string
      nickname:
        maxLength: 100
        type: string
      real_name:
        maxLength: 64
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
      updateBy:
        type: integer
      userId:
        type: integer
    required:
    - userId
    type: object
  dto.RealNameInfo:
    properties:
      audit_remark:
        description: 审核意见
        type: string
      audit_time:
        description: 审核时间戳
        type: integer
      auditor:
        description: 审核人
        type: string
      id_card:
        description: 身份证号（脱敏）
        type: string
      real_name:
        description: 实名姓名（脱敏）
        type: string
      status:
        description: 实名状态 0-未提交 1-审核中 2-已通过 3-已驳回
        type: integer
      submit_time:
        description: 提交时间戳
        type: integer
    type: object
  dto.RecentLogin:
    properties:
      device:
        description: 登录设备
        type: string
      ip:
        description: 登录 IP
        type: string
      location:
        description: 登录地点
        type: string
      login_time:
        description: 登录时间戳
        type: integer
    type: object
  dto.RenewalRecord:
    properties:
      amount:
        description: 续费金额（分）

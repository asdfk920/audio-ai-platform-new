  /api/v1/admin/list:
    get:
      description: 获取后台管理员账户信息，包括基本信息、关联角色、登录状态等
      parameters:
      - description: 关键词搜索管理员姓名或用户名
        in: query
        name: keyword
        type: string
      - description: 关联角色 ID 筛选
        in: query
        name: role_id
        type: integer
      - description: 管理员状态（1:禁用 2:正常）
        in: query
        name: status
        type: string
      - description: 最后登录时间起始（2006-01-02）
        in: query
        name: last_login_from
        type: string
      - description: 最后登录时间结束（2006-01-02）
        in: query
        name: last_login_to
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer

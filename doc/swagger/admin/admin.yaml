        in: query
        name: sort_by
        type: string
      - description: 排序方式
        in: query
        name: sort_order
        type: string
      responses:
        "200":
          description: '{"code": 200, "data": {...}}'
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - Bearer: []
      summary: 管理员列表
      tags:
      - 管理员/Admin

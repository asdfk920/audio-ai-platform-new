# 开发用统一 API 入口：对外 8080，反向代理到本机各 go-zero 服务。
# App/前端只需指向 http://localhost:8080
#
# 生产请改为 Kong / 云 CLB + WAF，并在此补充：TLS、限流、鉴权前置、审计日志投递等。

worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 开发环境允许浏览器跨域（生产应由网关域名白名单收敛）
    map $http_origin $cors_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" $http_origin;
    }

    server {
        listen 8080;
        server_name _;

        # user-api：路径已为 /api/v1/user/...
        location /api/v1/user/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_pass http://host.docker.internal:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # device-api：服务内路径为 /bind、/heartbeat 等，网关统一加前缀 /api/v1/device/
        location /api/v1/device/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            rewrite ^/api/v1/device/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:8002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # content-api：服务内路径为 /list、/upload-url 等
        location /api/v1/content/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            rewrite ^/api/v1/content/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:8003;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /healthz {
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            default_type text/plain;
            return 404 "unknown route; try /api/v1/user/... /api/v1/device/... /api/v1/content/...\n";
        }
    }
}
